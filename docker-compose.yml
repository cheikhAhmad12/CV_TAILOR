services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: cvtailor
      POSTGRES_USER: cvtailor
      POSTGRES_PASSWORD: cvtailor

  backend:
    build:
      context: .
      dockerfile: DOCKERFILE
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://cvtailor:cvtailor@postgres:5432/cvtailor
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  pgadmin:
    image: dpage/pgadmin4:8
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cvtailor.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres

volumes:
  pgadmin_data:
